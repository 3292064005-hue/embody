[pytest]
pythonpath =
    ../..
    src/arm_backend_common
    src/arm_bringup
    src/arm_calibration
    src/arm_diagnostics
    src/arm_hardware_bridge
    src/arm_lifecycle_manager
    src/arm_logger
    src/arm_mock_tools
    src/arm_profiles
    src/arm_readiness_manager
    src/arm_safety_supervisor
    src/arm_task_orchestrator
    src/arm_motion_planner
    src/arm_motion_executor
    src/arm_common
    src/arm_interfaces
    src/arm_camera_driver
    src/arm_perception
    src/arm_scene_manager
    src/arm_grasp_planner
    src/arm_sim
    src/arm_tools
    src/arm_tests
testpaths = tests
filterwarnings =
    ignore:Please use `import python_multipart` instead\.:PendingDeprecationWarning
addopts =
    --ignore=tests/test_queue_and_reservation.py
    --ignore=tests/test_readiness_and_planning.py
    --ignore=tests/test_split_stack_runtime.py
    --ignore=tests/test_verification.py
    --ignore=tests/test_new_package_imports.py
