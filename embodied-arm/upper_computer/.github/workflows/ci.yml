name: ci

on:
  push:
  pull_request:

jobs:
  ros-humble:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Setup ROS 2 Humble
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg2 lsb-release software-properties-common python3-pip
          sudo add-apt-repository universe
          sudo curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.asc \
            -o /usr/share/keyrings/ros-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] http://packages.ros.org/ros2/ubuntu $(. /etc/os-release && echo $UBUNTU_CODENAME) main" \
            | sudo tee /etc/apt/sources.list.d/ros2.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y \
            ros-humble-ros-base \
            python3-colcon-common-extensions \
            python3-rosdep \
            python3-vcstool
          sudo rosdep init || true
          rosdep update
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest pyyaml
      - name: Install backend dependencies
        run: |
          source /opt/ros/humble/setup.bash
          cd upper_computer/backend/embodied_arm_ws
          rosdep install --from-paths src --ignore-src -r -y --rosdistro humble
      - name: Backend build
        run: |
          source /opt/ros/humble/setup.bash
          cd upper_computer/backend/embodied_arm_ws
          colcon build --symlink-install
      - name: ROS smoke tests
        run: |
          source /opt/ros/humble/setup.bash
          cd upper_computer/backend/embodied_arm_ws
          source install/setup.bash
          pytest tests/test_ros_launch_smoke.py -q
          pytest tests/test_gateway_dispatcher_feedback_roundtrip.py -q
  frontend:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Pin npm
        run: npm install -g npm@10.9.2
      - name: Frontend checks
        run: |
          cd upper_computer/frontend
          npm ci
          npm run typecheck
          npm run typecheck:test
          npm run test:unit
          npm run build
