schema_version: 2
product_lines:
  preview:
    label: Preview / Contract Only
    description: 仅用于能力验证、链路联调与只读工作台。
    task_workbench_visible: false
    task_execution_interactive: false
    runtime_badge: PREVIEW
    promotion_controlled: false
  validated_sim:
    label: Validated Simulation
    description: 已验证仿真 authoritative lane，可进入正式任务工作台。
    task_workbench_visible: true
    task_execution_interactive: true
    runtime_badge: VALIDATED_SIM
    promotion_controlled: false
  validated_live:
    label: Validated Live Hardware
    description: 仅当 validated_live backbone、target-runtime gate、HIL gate 与 release
      checklist 全部通过时，才开放真机任务工作台。
    task_workbench_visible: true
    task_execution_interactive: true
    fail_closed_task_workbench_visible: false
    fail_closed_task_execution_interactive: false
    runtime_badge: VALIDATED_LIVE
    promotion_controlled: true
planning_backends:
  validated_sim_default:
    plugin: deterministic_simulation
    declared: true
    capability_mode: validated_sim
    planner_plugin: pilz_industrial_motion_planner
    scene_source: runtime_scene_service
    workspace_bounds:
      min_x: -0.35
      max_x: 0.35
      min_y: -0.35
      max_y: 0.35
      min_z: 0.02
      max_z: 0.45
      min_yaw: -3.14159
      max_yaw: 3.14159
      approach_offset_z: 0.08
    named_poses:
      home:
        joint_1: 0.0
        joint_2: 0.0
        joint_3: 0.0
        joint_4: 0.0
        joint_5: 0.0
        joint_6: 0.0
      stow:
        joint_1: 0.0
        joint_2: -0.35
        joint_3: 0.7
        joint_4: 0.0
        joint_5: 0.55
        joint_6: 0.0
      inspect:
        joint_1: 0.0
        joint_2: -0.1
        joint_3: 0.35
        joint_4: 0.0
        joint_5: 0.2
        joint_6: 0.0
    metadata:
      executionModel: validated_simulation_runtime
  validated_live_bridge:
    plugin: http_bridge
    declared: false
    capability_mode: validated_live
    planner_plugin: moveit_http_bridge
    scene_source: runtime_scene_service
    url: http://127.0.0.1:8088/plan
    timeout_sec: 1.5
    metadata:
      executionModel: validated_live_bridge
promotion_tiers:
  validated_sim:
    promoted: true
    receipt_id: validated-sim-baseline
    checked_by: repository-ci
    checked_at: '2026-04-08T00:00:00Z'
    required_evidence:
    - backend-active
    - gateway
    - contract-artifacts
    - runtime-contracts
    evidence:
    - backend-active
    - gateway
    - contract-artifacts
    - runtime-contracts
  validated_live:
    promoted: false
    receipt_id: ''
    checked_by: ''
    checked_at: ''
    required_evidence:
    - validated_live_backbone_declared
    - target_runtime_gate_passed
    - hil_gate_passed
    - release_checklist_signed
    evidence: []
    reason: fail_closed_until_validated_live_backbone_and_release_gates_are_committed
