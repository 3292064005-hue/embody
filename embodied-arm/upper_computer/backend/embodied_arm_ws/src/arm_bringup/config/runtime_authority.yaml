schema_version: 4
product_lines:
  preview:
    label: Preview / Contract Only
    description: 仅用于能力验证、链路联调与只读工作台。
    task_workbench_visible: false
    task_execution_interactive: false
    runtime_badge: PREVIEW
    promotion_controlled: false
  validated_sim:
    label: Validated Simulation
    description: 已验证仿真 authoritative lane，可进入正式任务工作台。
    task_workbench_visible: true
    task_execution_interactive: true
    runtime_badge: VALIDATED_SIM
    promotion_controlled: false
  validated_live:
    label: Validated Live Hardware
    description: 仅当 validated_live backbone、target-runtime gate、HIL gate 与 release
      checklist 全部通过时，才开放真机任务工作台。
    task_workbench_visible: true
    task_execution_interactive: true
    fail_closed_task_workbench_visible: false
    fail_closed_task_execution_interactive: false
    runtime_badge: VALIDATED_LIVE
    promotion_controlled: true
planning_backends:
  validated_sim_default:
    plugin: deterministic_simulation
    declared: true
    capability_mode: validated_sim
    planner_plugin: pilz_industrial_motion_planner
    scene_source: runtime_scene_service
    workspace_bounds:
      min_x: -0.35
      max_x: 0.35
      min_y: -0.35
      max_y: 0.35
      min_z: 0.02
      max_z: 0.45
      min_yaw: -3.14159
      max_yaw: 3.14159
      approach_offset_z: 0.08
    named_poses:
      home:
        joint_1: 0.0
        joint_2: 0.0
        joint_3: 0.0
        joint_4: 0.0
        joint_5: 0.0
        joint_6: 0.0
      stow:
