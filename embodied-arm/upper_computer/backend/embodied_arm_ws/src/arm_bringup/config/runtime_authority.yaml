    named_poses:
      home:
        joint_1: 0.0
        joint_2: 0.0
        joint_3: 0.0
        joint_4: 0.0
        joint_5: 0.0
        joint_6: 0.0
      stow:
        joint_1: 0.0
        joint_2: -0.35
        joint_3: 0.7
        joint_4: 0.0
        joint_5: 0.55
        joint_6: 0.0
      inspect:
        joint_1: 0.0
        joint_2: -0.1
        joint_3: 0.35
        joint_4: 0.0
        joint_5: 0.2
        joint_6: 0.0
    metadata:
      executionModel: validated_live_runtime_service
      planningBoundary: runtime_service_bridge
promotion_tiers:
  validated_sim:
    promoted: true
    receipt_id: validated-sim-baseline
    checked_by: repository-ci
    checked_at: '2026-04-08T00:00:00Z'
    required_evidence:
    - backend-active
    - gateway
    - contract-artifacts
    - runtime-contracts
    evidence:
    - backend-active
    - gateway
    - contract-artifacts
    - runtime-contracts
  validated_live:
    promotion_mode: automatic_when_ready
    promoted: false
    receipt_id: ''
    checked_by: ''
    checked_at: ''
    required_evidence:
    - validated_live_backbone_declared
    - target_runtime_gate_passed
    - hil_gate_passed
    - release_checklist_signed
