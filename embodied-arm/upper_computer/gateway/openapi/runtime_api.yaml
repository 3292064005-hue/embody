components:
  schemas:
    CalibrationOffsets:
      properties:
        x:
          type: number
          title: X
          default: 0.0
        y:
          type: number
          title: Y
          default: 0.0
        z:
          type: number
          title: Z
          default: 0.0
      type: object
      title: CalibrationOffsets
    CalibrationProfileRequest:
      properties:
        profileName:
          type: string
          maxLength: 64
          minLength: 1
          pattern: ^[A-Za-z0-9._-]+$
          title: Profilename
          default: default
        roi:
          $ref: '#/components/schemas/CalibrationRoi'
        tableScaleMmPerPixel:
          type: number
          exclusiveMinimum: 0.0
          title: Tablescalemmperpixel
          default: 1.0
        offsets:
          $ref: '#/components/schemas/CalibrationOffsets'
      type: object
      title: CalibrationProfileRequest
    CalibrationRoi:
      properties:
        x:
          type: integer
          minimum: 0.0
          title: X
          default: 0
        y:
          type: integer
          minimum: 0.0
          title: Y
          default: 0
        width:
          type: integer
          exclusiveMinimum: 0.0
          title: Width
          default: 640
        height:
          type: integer
          exclusiveMinimum: 0.0
          title: Height
          default: 480
      type: object
      title: CalibrationRoi
    GripperRequest:
      properties:
        open:
          type: boolean
          title: Open
          default: true
      type: object
      title: GripperRequest
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    JogJointRequest:
      properties:
        jointIndex:
          type: integer
          maximum: 5.0
          minimum: 0.0
          title: Jointindex
        direction:
          type: integer
          enum:
          - -1
          - 1
          title: Direction
          default: 1
        stepDeg:
          type: number
          maximum: 10.0
          exclusiveMinimum: 0.0
          title: Stepdeg
          default: 2.0
      type: object
      required:
      - jointIndex
      title: JogJointRequest
    ServoCartesianRequest:
      properties:
        axis:
          type: string
          enum:
          - x
          - y
          - z
          - rx
          - ry
          - rz
          title: Axis
        delta:
          type: number
          maximum: 0.1
          minimum: -0.1
          title: Delta
      type: object
      required:
      - axis
      - delta
      title: ServoCartesianRequest
    SetModeRequest:
      properties:
        mode:
          type: string
          enum:
          - idle
          - manual
          - task
          - maintenance
          title: Mode
      type: object
      required:
      - mode
      title: SetModeRequest
    StartTaskRequest:
      properties:
        templateId:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Templateid
        taskType:
          type: string
          enum:
          - pick_place
          - sort_by_color
          - sort_by_qr
          - clear_table
          title: Tasktype
          default: pick_place
        targetCategory:
          anyOf:
          - type: string
            enum:
            - red
            - blue
            - green
            - qr_a
            - qr_b
            - qr_c
          - type: 'null'
          title: Targetcategory
      type: object
      title: StartTaskRequest
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
