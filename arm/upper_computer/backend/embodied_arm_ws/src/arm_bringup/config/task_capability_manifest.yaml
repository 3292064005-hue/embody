- id: pick-red
  template_version: 2
  name: 抓取红色目标
  description: 单目标抓取并放置到红色料区。
  frontend_task_type: pick_place
  backend_task_type: PICK_AND_PLACE
  task_profile_path: task_pick_by_color.yaml
  default_target_category: red
  allowed_target_categories:
  - red
  resolved_place_profiles:
    red: bin_red
  risk_level: low
  required_runtime_tier: validated_sim
  runtime_tier_compatibility:
  - validated_sim
  - validated_live
  operator_hint: 适合单目标验证链路与基础抓取验收。
  capability_tags:
  - pick
  - single_target
  - color:red
  preconditions:
  - readiness.target_available
  - readiness.motion_planner
  - readiness.hardware_bridge
  sequence_mode: single_target
  plugin_key: single_target
  plugin_contract_version: 1
  plugin_state: active
  graph_key: pick-red
  task_graph:
    graphKey: pick-red
    entryNode: perception
    sequenceMode: single_target
    pluginKey: single_target
    preconditions:
    - readiness.target_available
    - readiness.motion_planner
    - readiness.hardware_bridge
    nodes:
    - id: perception
      kind: perception
      stage: perception
      label: 目标确认
      terminal: false
    - id: plan
      kind: planning
      stage: planning
      label: 轨迹规划
      terminal: false
    - id: execute
      kind: execution
      stage: execution
      label: 执行
      terminal: false
    - id: verify
      kind: verification
      stage: verification
      label: 结果校验
      terminal: true
    edges:
    - from: perception
      to: plan
      condition: target_locked
    - from: plan
      to: execute
      condition: plan_ready
    - from: execute
      to: verify
      condition: execution_done
    recoveryPolicy: &id001
      mode: retry_once_then_fail_closed
      maxAutomaticRetry: 1
      maxRetries: 2
    recovery: *id001
    auditSurface:
    - perception
    - plan
    - execute
    - verify
    graphVersion: v1
    templateId: pick-red
